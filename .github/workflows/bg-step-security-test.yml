name: bg-outlive-test
on:
  push:
    paths:
      - '.github/workflows/bg-step-security-test.yml'

jobs:
  outlive-test:
    runs-on: ubuntu-latest
    steps:
      - name: bg-persist
        id: persist
        background: true
        run: |
          echo "BG_START pid=$$ ppid=$PPID"
          echo "BG RUNNER_TEMP=$RUNNER_TEMP"
          echo "BG GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          for i in $(seq 1 60); do
            if [ -f "$GITHUB_WORKSPACE/fg-secret.txt" ]; then
              echo "BG_TICK_$i FILE_READ=$(cat $GITHUB_WORKSPACE/fg-secret.txt)"
            else
              echo "BG_TICK_$i NO_FILE_YET"
            fi
            sleep 1
          done

      - name: write-workspace-secret
        run: |
          echo "FG1 writing secret to workspace file"
          echo "WORKSPACE-FILE-CANARY-SECRET-88888" > "$GITHUB_WORKSPACE/fg-secret.txt"
          sleep 2

      - name: verify-written
        run: |
          echo "FG2 file exists: $(cat $GITHUB_WORKSPACE/fg-secret.txt)"
          sleep 5

      - name: no-cancel
        run: echo "FG3 NOT cancelling bg - letting job end with bg still running"
