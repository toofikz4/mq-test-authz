name: bg-step-env-race-test
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  bg-race:
    runs-on: ubuntu-latest
    steps:
      - name: bg-writer
        background: true
        run: |
          for i in $(seq 1 5); do
            echo "BG_SECRET_$i=bg-canary-value-$i" >> $GITHUB_ENV
            echo "/tmp/bg-injected-path-$i" >> $GITHUB_PATH
            sleep 1
          done
          echo "BG_WRITER_DONE=true" >> $GITHUB_ENV
      - name: fg-reader-immediate
        run: |
          echo "FG_IMMEDIATE_CHECK:"
          echo "  BG_SECRET_1=$BG_SECRET_1"
          echo "  BG_SECRET_5=$BG_SECRET_5"
          echo "  BG_WRITER_DONE=$BG_WRITER_DONE"
          echo "  GITHUB_ENV contents:"
          cat $GITHUB_ENV 2>/dev/null || echo "  (no GITHUB_ENV)"
          echo "  GITHUB_PATH contents:"
          cat $GITHUB_PATH 2>/dev/null || echo "  (no GITHUB_PATH)"
          echo "  PATH check:"
          echo "$PATH" | tr ':' '\n' | grep bg-injected | head -5
      - wait-all:
      - name: fg-reader-after-wait
        run: |
          echo "FG_AFTER_WAIT_CHECK:"
          echo "  BG_SECRET_1=$BG_SECRET_1"
          echo "  BG_SECRET_5=$BG_SECRET_5"
          echo "  BG_WRITER_DONE=$BG_WRITER_DONE"
          echo "  PATH bg-injected count: $(echo $PATH | tr ':' '\n' | grep -c bg-injected)"