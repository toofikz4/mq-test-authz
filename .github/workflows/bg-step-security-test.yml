name: bg-test-minimal
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/bg-step-security-test.yml'

jobs:
  test-bg:
    runs-on: ubuntu-latest
    steps:
      - name: normal-step
        run: echo "normal step"
      
      - name: bg-service
        id: bg1
        background: true
        run: |
          echo "background step running"
          sleep 10
          echo "background done"
      
      - name: continue
        run: |
          echo "this runs while bg1 is still going"
          sleep 5
      
      - name: stop-bg
        cancel: bg1
