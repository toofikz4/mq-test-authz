name: bg-output-race-test
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: bg-output-writer
        id: bgwriter
        background: true
        run: |
          echo "secret_data=BG-OUTPUT-CANARY-$(date +%s)" >> $GITHUB_OUTPUT
          echo "status=writing" >> $GITHUB_OUTPUT
          sleep 3
          echo "final_value=BG-FINAL-VALUE" >> $GITHUB_OUTPUT
          echo "status=done" >> $GITHUB_OUTPUT
      - name: fg-reader-immediate
        run: |
          echo "IMMEDIATE_READ:"
          echo "  bgwriter.secret_data=${{ steps.bgwriter.outputs.secret_data }}"
          echo "  bgwriter.status=${{ steps.bgwriter.outputs.status }}"
          echo "  bgwriter.final_value=${{ steps.bgwriter.outputs.final_value }}"
          echo "  GITHUB_OUTPUT_FILE=$GITHUB_OUTPUT"
          echo "  OUTPUT_FILE_CONTENTS:"
          cat $GITHUB_OUTPUT 2>/dev/null || echo "  (cannot read)"
      - wait-all:
      - name: fg-reader-after-wait
        run: |
          echo "AFTER_WAIT_READ:"
          echo "  bgwriter.secret_data=${{ steps.bgwriter.outputs.secret_data }}"
          echo "  bgwriter.status=${{ steps.bgwriter.outputs.status }}"
          echo "  bgwriter.final_value=${{ steps.bgwriter.outputs.final_value }}"