name: token-perm-test-v2
on:
  push:
    paths:
      - '.github/workflows/token-perm-test.yml'

permissions:
  contents: read

jobs:
  test-token-scope:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: token-info
        run: |
          echo "=== TOKEN SCOPES ==="
          curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY" | jq '{permissions}'
          
      - name: try-writes
        run: |
          echo "=== CREATE ISSUE ==="
          echo "status=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/$GITHUB_REPOSITORY/issues" -d '{"title":"perm-test"}')"
          
          echo "=== CREATE RELEASE ==="
          echo "status=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/$GITHUB_REPOSITORY/releases" -d '{"tag_name":"perm-v0.1"}')"
          
          echo "=== CREATE DEPLOYMENT ==="
          echo "status=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/$GITHUB_REPOSITORY/deployments" -d '{"ref":"main"}')"
          
          echo "=== REPO DISPATCH ==="
          echo "status=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/$GITHUB_REPOSITORY/dispatches" -d '{"event_type":"test"}')"
          
          echo "=== DELETE BRANCH PROTECTION ==="
          echo "status=$(curl -s -o /dev/null -w '%{http_code}' -X DELETE -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/$GITHUB_REPOSITORY/branches/main/protection")"
          
          echo "=== CREATE COMMIT STATUS ==="
          SHA=$(curl -s -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/$GITHUB_REPOSITORY/commits/main" | jq -r '.sha')
          echo "status=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$SHA" -d '{"state":"success","context":"perm-test"}')"
          
          echo "=== GRAPHQL addStar ==="
          RESP=$(curl -s -X POST -H "Authorization: bearer $GH_TOKEN" -H "Content-Type: application/json" "https://api.github.com/graphql" -d '{"query":"mutation { addStar(input:{starrableId:\"R_kgDOTFaglQ\"}) { starrable { id } } }"}')
          echo "addStar: $(echo $RESP | jq -r '.errors[0].type // "SUCCESS"')"
