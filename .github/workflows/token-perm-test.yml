name: token-gql-scope
on:
  workflow_dispatch:
permissions:
  contents: read
  actions: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: test-gql-scope
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "=== GITHUB_TOKEN GraphQL scope test ==="
          echo -n "Own repo (should work): "
          curl -s -X POST https://api.github.com/graphql \
            -H "Authorization: Bearer $GH_TOKEN" -H "Content-Type: application/json" \
            -d '{"query":"{ repository(owner:\"toofikz4\",name:\"mq-test-authz\") { name } }"}' | \
            python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('data',{}).get('repository',{}).get('name','FAIL'))"
          
          echo -n "Cross-repo public (should fail): "
          curl -s -X POST https://api.github.com/graphql \
            -H "Authorization: Bearer $GH_TOKEN" -H "Content-Type: application/json" \
            -d '{"query":"{ repository(owner:\"toofikz4\",name:\"gha-diag-1782340688\") { name } }"}' | \
            python3 -c "import sys,json;d=json.load(sys.stdin);r=d.get('data',{}).get('repository');print(r.get('name') if r else 'NULL/denied')"
          
          echo -n "Cross-repo private (should fail): "
          curl -s -X POST https://api.github.com/graphql \
            -H "Authorization: Bearer $GH_TOKEN" -H "Content-Type: application/json" \
            -d '{"query":"{ repository(owner:\"toofikz4\",name:\"disc-secret\") { name } }"}' | \
            python3 -c "import sys,json;d=json.load(sys.stdin);r=d.get('data',{}).get('repository');print(r.get('name') if r else 'NULL/denied')"
          
          echo -n "Viewer login: "
          curl -s -X POST https://api.github.com/graphql \
            -H "Authorization: Bearer $GH_TOKEN" -H "Content-Type: application/json" \
            -d '{"query":"{ viewer { login } }"}' | \
            python3 -c "import sys,json;print(json.load(sys.stdin).get('data',{}).get('viewer',{}).get('login','FAIL'))"